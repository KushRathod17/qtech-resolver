name: tests

# Every push and every PR. The point is to prove the suites pass on a CLEAN
# machine — which is exactly what caught the empty Alembic baseline: it worked
# locally only because the dev database had been built by create_all() long
# before the migrations existed.
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qtech_resolver
        ports:
          - 5432:5432
        # Without this the job races the container and the first connection
        # fails on a database that is still starting up.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The test suite derives its scratch databases from this URL and never
      # writes to the one named here.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qtech_resolver
      JWT_SECRET_KEY: ci-only-secret-not-used-for-anything-real
      CORS_ORIGINS: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # 3.13+ removed the `crypt` module passlib needs
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: Build
        run: npm run build
